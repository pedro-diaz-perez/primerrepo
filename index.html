<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Examen Completo</title>
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        margin: 20px;
      }
      .question {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 10px;
      }
      .result {
        margin-top: 10px;
        font-weight: bold;
      }
      .correct {
        color: green;
      }
      .incorrect {
        color: red;
      }
      button {
        display: block;
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <h1>EXAMEN COMPLETO INTERACTIVO</h1>
    <div id="quiz"></div>

    <script>
      function shuffle(a) {
        return a.sort(() => Math.random() - 0.5);
      }

      let preguntas = [
        {
          t: `¿Qué nombre recibe el movimiento de bucle aparentemente errático que dibujan los planetas respecto a las estrellas fijas?`,
          o: [
            `Precesión.`,
            `Retrogradación.`,
            `Traslación elíptica.`,
            `Nutación.`,
          ],
          c: `Retrogradación.`,
        },
        {
          t: `La "Hipópede", ideada por Eudoxo para resolver la retrogradación, es una curva con forma de:`,
          o: [
            `Círculo perfecto.`,
            `Elipse achatada.`,
            `Forma de "ocho".`,
            `Espiral infinita.`,
          ],
          c: `Forma de "ocho".`,
        },
        {
          t: `En el modelo de Ptolomeo, el pequeño círculo sobre el que se desplaza el planeta se llama:`,
          o: [`Deferente.`, `Ecuador.`, `Epiciclo.`, `Órbita mayor.`],
          c: `Epiciclo.`,
        },
        {
          t: `¿Qué es el "Deferente" en el sistema ptolemaico?`,
          o: [
            `El punto donde el planeta se detiene.`,
            `El círculo mayor sobre el que se mueve el centro del epiciclo.`,
            `La distancia entre la Tierra y la Luna.`,
            `El eje de rotación terrestre.`,
          ],
          c: `El círculo mayor sobre el que se mueve el centro del epiciclo.`,
        },
        {
          t: `El "Heliocentrismo", modelo que sitúa al Sol en el centro, fue propuesto inicialmente en la antigüedad por:`,
          o: [
            `Ptolomeo.`,
            `Aristarco de Samos.`,
            `Eratóstenes.`,
            `Anaximandro.`,
          ],
          c: `Aristarco de Samos.`,
        },
        {
          t: `¿Qué establecieron las "Leyes de Kepler" respecto a las órbitas planetarias?`,
          o: [
            `Que son círculos perfectos.`,
            `Que son elipses, rompiendo el ideal circular antiguo.`,
            `Que los planetas no se mueven.`,
            `Que las órbitas son irregulares y sin leyes.`,
          ],
          c: `Que son elipses, rompiendo el ideal circular antiguo.`,
        },
        {
          t: `El "Principio de Inercia" de la física moderna establece que un objeto mantiene su estado de movimiento o reposo a menos que:`,
          o: [
            `Pase el tiempo suficiente.`,
            `Actúe una fuerza externa sobre él.`,
            `Entre en la región supralunar.`,
            `Alcance su lugar natural.`,
          ],
          c: `Actúe una fuerza externa sobre él.`,
        },
        {
          t: `El "Principio de Relatividad" afirma que:`,
          o: [
            `Todo conocimiento es subjetivo.`,
            `Las leyes físicas cambian según el observador.`,
            `No hay experimento que distinga entre reposo y movimiento rectilíneo uniforme.`,
            `La velocidad de la luz es variable.`,
          ],
          c: `No hay experimento que distinga entre reposo y movimiento rectilíneo uniforme.`,
        },
        {
          t: `El paso del "Mito al Logos" se sitúa históricamente en el siglo:`,
          o: [`I d.C.`, `VI a.C.`, `XV d.C.`, `IV a.C.`],
          c: `VI a.C.`,
        },
        {
          t: `¿Cómo definió Anaximandro el "Ápeiron"?`,
          o: [
            `Como el agua primordial.`,
            `Como el átomo indivisible.`,
            `Como algo "indefinido" o "ilimitado".`,
            `Como el aire que respiramos.`,
          ],
          c: `Como algo "indefinido" o "ilimitado".`,
        },

        {
          t: `Según Aristóteles, el "Éter" es un elemento de naturaleza:`,
          o: [
            `Corruptible y pesada.`,
            `Divina, perfecta e inalterable.`,
            `Gaseosa y volátil.`,
            `Imaginaria y sin masa.`,
          ],
          c: `Divina, perfecta e inalterable.`,
        },
        {
          t: `La "Región Sublunar" en la división aristotélica es el lugar de:`,
          o: [
            `La eternidad y la perfección.`,
            `El cambio, la generación y la corrupción.`,
            `El movimiento circular uniforme.`,
            `La luz pura y el éter.`,
          ],
          c: `El cambio, la generación y la corrupción.`,
        },
        {
          t: `La "Teleología" o concepción finalista sostiene que las sustancias:`,
          o: [
            `Se mueven por azar ciego.`,
            `Tienden a ocupar su lugar natural o cumplir una finalidad.`,
            `Son máquinas sin propósito.`,
            `No existen realmente.`,
          ],
          c: `Tienden a ocupar su lugar natural o cumplir una finalidad.`,
        },
        {
          t: `El "Antropocentrismo" es la perspectiva que sitúa:`,
          o: [
            `Al Sol en el centro del sistema.`,
            `Al ser humano como un observador privilegiado.`,
            `A Dios como único motor del universo.`,
            `Al azar como explicación de la vida.`,
          ],
          c: `Al ser humano como un observador privilegiado.`,
        },
        {
          t: `La visión de Descartes que entiende el universo como máquinas con partes que se transmiten movimiento por contacto es el:`,
          o: [`Vitalismo.`, `Mecanicismo.`, `Animismo.`, `Existencialismo.`],
          c: `Mecanicismo.`,
        },
        {
          t: `Según Descartes, la masa y la extensión son "Propiedades Primarias" porque son:`,
          o: [
            `Dependientes del sujeto.`,
            `Objetivas y matematizables.`,
            `Basadas en el color y el sabor.`,
            `Imposibles de medir.`,
          ],
          c: `Objetivas y matematizables.`,
        },
        {
          t: `Las "Propiedades Secundarias", como el color o el sabor, se caracterizan por:`,
          o: [
            `Ser inherentes a la materia.`,
            `Ser universales para todos los objetos.`,
            `Depender del sujeto que las percibe.`,
            `Ser la base de la física moderna.`,
          ],
          c: `Depender del sujeto que las percibe.`,
        },
        {
          t: `¿Qué astrónomo utilizó la trigonometría para intentar medir las distancias del Sol y la Luna?`,
          o: [`Eratóstenes.`, `Aristarco de Samos.`, `Copérnico.`, `Brahe.`],
          c: `Aristarco de Samos.`,
        },
        {
          t: `Eratóstenes es reconocido por calcular con gran precisión:`,
          o: [
            `La masa de Júpiter.`,
            `La circunferencia de la Tierra.`,
            `La distancia a las estrellas fijas.`,
            `La velocidad del sonido.`,
          ],
          c: `La circunferencia de la Tierra.`,
        },
        {
          t: `El modelo de Tycho Brahe propone que:`,
          o: [
            `La Tierra gira alrededor del Sol.`,
            `El Sol gira alrededor de la Tierra y los planetas alrededor del Sol.`,
            `El universo es un gran átomo.`,
            `Todos los planetas son independientes.`,
          ],
          c: `El Sol gira alrededor de la Tierra y los planetas alrededor del Sol.`,
        },

        {
          t: `Giordano Bruno defendió la idea de:`,
          o: [
            `Un universo finito y cerrado.`,
            `La infinitud del universo y múltiples sistemas solares.`,
            `Que la Tierra es el centro absoluto.`,
            `Que los planetas son dioses.`,
          ],
          c: `La infinitud del universo y múltiples sistemas solares.`,
        },
        {
          t: `David Hilbert convocó un congreso en París en 1900 para:`,
          o: [
            `Prohibir la investigación científica.`,
            `Elaborar un sistema axiomático completo para la razón humana.`,
            `Celebrar el descubrimiento de la penicilina.`,
            `Unificar las religiones del mundo.`,
          ],
          c: `Elaborar un sistema axiomático completo para la razón humana.`,
        },
        {
          t: `La "Metafísica" se define como:`,
          o: [
            `El estudio de las leyes del movimiento.`,
            `El estudio global de la realidad en toda su dimensión.`,
            `El análisis de la gramática.`,
            `La observación de las células.`,
          ],
          c: `El estudio global de la realidad en toda su dimensión.`,
        },
        {
          t: `La rama que estudia los fundamentos y métodos del conocimiento científico es la:`,
          o: [`Estética.`, `Epistemología.`, `Retórica.`, `Metafísica.`],
          c: `Epistemología.`,
        },
        {
          t: `La "Estética" es la disciplina filosófica que estudia:`,
          o: [
            `La moralidad de los actos.`,
            `La belleza y los fundamentos del arte.`,
            `El movimiento de los cuerpos.`,
            `El origen del lenguaje.`,
          ],
          c: `La belleza y los fundamentos del arte.`,
        },
        {
          t: `La "Retórica" se define como:`,
          o: [
            `El estudio de la verdad absoluta.`,
            `El arte de expresarse correctamente para persuadir.`,
            `La medición de los astros.`,
            `La lógica matemática pura.`,
          ],
          c: `El arte de expresarse correctamente para persuadir.`,
        },
        {
          t: `El "Arjé" (αρχη) para Tales de Mileto era:`,
          o: [`El aire.`, `El agua.`, `El átomo.`, `El fuego.`],
          c: `El agua.`,
        },
        {
          t: `Para Demócrito, el "Arjé" o principio primero era:`,
          o: [`El ápeiron.`, `El agua.`, `El átomo.`, `La tierra.`],
          c: `El átomo.`,
        },
        {
          t: `Según Aristóteles, el principio de causalidad dice que "todo lo que está en movimiento...":`,
          o: [
            `Se mueve por sí solo.`,
            `Es movido por otro.`,
            `No tiene causa racional.`,
            `Tiende a la quietud eterna.`,
          ],
          c: `Es movido por otro.`,
        },
        {
          t: `El concepto de "Falsación" es la clave de la metodología científica de:`,
          o: [
            `Isaac Newton.`,
            `Karl Popper.`,
            `Galileo Galilei.`,
            `René Descartes.`,
          ],
          c: `Karl Popper.`,
        },

        {
          t: `La "Cosmología" es la visión de conjunto de la totalidad del cosmos donde los elementos están:`,
          o: [
            `Desordenados y al azar.`,
            `Sistemáticamente ordenados.`,
            `Creados por mitos.`,
            `Ocultos a la razón.`,
          ],
          c: `Sistemáticamente ordenados.`,
        },
        {
          t: `La "Filosofía" se define como el conjunto de saberes que busca establecer los principios más generales para organizar:`,
          o: [
            `La economía de un país.`,
            `El conocimiento de la realidad y el sentido del obrar humano.`,
            `La estructura de los edificios antiguos.`,
            `La clasificación de los animales.`,
          ],
          c: `El conocimiento de la realidad y el sentido del obrar humano.`,
        },
        {
          t: `La "Ciencia" se diferencia de otros saberes por deducir leyes generales con:`,
          o: [
            `Capacidad de convencer por la fuerza.`,
            `Capacidad predictiva y comprobación experimental.`,
            `Historias basadas en dioses.`,
            `Intuiciones personales subjetivas.`,
          ],
          c: `Capacidad predictiva y comprobación experimental.`,
        },
        {
          t: `La disciplina que investiga el conocimiento y la práctica científica es la:`,
          o: [
            `Sociología.`,
            `Filosofía de la Ciencia.`,
            `Astronomía.`,
            `Astrología.`,
          ],
          c: `Filosofía de la Ciencia.`,
        },
        {
          t: `Un "Paradigma" se entiende comúnmente en ciencia como:`,
          o: [
            `Un error de cálculo recurrente.`,
            `Un marco de referencia o modelo aceptado por la comunidad científica.`,
            `Un instrumento para ver las estrellas.`,
            `Una ley que nunca cambia.`,
          ],
          c: `Un marco de referencia o modelo aceptado por la comunidad científica.`,
        },
        {
          t: `¿Cuál es el nombre de la gran obra de Ptolomeo?`,
          o: [
            `De revolutionibus.`,
            `El Almagesto.`,
            `La Nueva Astronomía.`,
            `El Mensajero Sideral.`,
          ],
          c: `El Almagesto.`,
        },
        {
          t: `El "Astrolabio" es un instrumento utilizado para:`,
          o: [
            `Pesar metales preciosos.`,
            `Observar y calcular la posición de los astros.`,
            `Medir la presión atmosférica.`,
            `Curar enfermedades.`,
          ],
          c: `Observar y calcular la posición de los astros.`,
        },
        {
          t: `Si algo es "Ininteligible", significa que:`,
          o: [
            `Es fácil de ver con un microscopio.`,
            `No puede ser comprendido por la razón humana.`,
            `Es un concepto matemático puro.`,
            `Es algo muy antiguo.`,
          ],
          c: `No puede ser comprendido por la razón humana.`,
        },
        {
          t: `Galileo Galilei es relevante por confirmar el heliocentrismo y establecer los principios de:`,
          o: [
            `Gravedad y masa.`,
            `Inercia y relatividad.`,
            `Teleología y éter.`,
            `Retórica y estética.`,
          ],
          c: `Inercia y relatividad.`,
        },
        {
          t: `Isaac Newton culminó la revolución científica al demostrar que todos los cuerpos son el origen de:`,
          o: [
            `El éter.`,
            `La fuerza de gravedad.`,
            `La ininteligibilidad.`,
            `El movimiento circular perfecto.`,
          ],
          c: `La fuerza de gravedad.`,
        },
      ];

      preguntas = shuffle(preguntas);

      const quiz = document.getElementById("quiz");

      preguntas.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "question";

        const titulo = document.createElement("p");
        titulo.textContent = i + 1 + ". " + p.t;
        div.appendChild(titulo);

        const res = document.createElement("div");

        shuffle(p.o).forEach((op) => {
          const btn = document.createElement("button");
          btn.textContent = op;
          btn.onclick = () => {
            res.textContent = op === p.c ? "✔ Correcto" : "✘ Incorrecto";
            res.className = "result " + (op === p.c ? "correct" : "incorrect");
          };
          div.appendChild(btn);
        });

        div.appendChild(res);
        quiz.appendChild(div);
      });
    </script>
  </body>
</html>
